<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cuidado de Mascotas</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body>

    <!-- Navegación -->
    <nav>
        <a href="/" onclick="navigate(event, '/')">Inicio</a>
        <a href="/solicitudes" onclick="navigate(event, '/solicitudes')">Mis solicitudes</a>
        <a href="/login" onclick="navigate(event, '/login')" id="nav-login">Login</a>
        <a href="#" onclick="logout()" id="nav-logout" style="display:none">Cerrar sesión</a>
    </nav>

    <!-- Contenedor donde el JS inyecta las vistas -->
    <main id="app"></main>

    <!-- Templates de las vistas (ocultos, el JS los clona) -->
    <template id="tpl-home">
        <section>
            <h1>Bienvenido</h1>
            <p>Plataforma de cuidado de mascotas.</p>
        </section>
    </template>

    <template id="tpl-login">
        <section>
            <h2>Iniciar sesión</h2>
            <form id="form-login">
                <input type="email" name="email" placeholder="Email" required>
                <input type="password" name="password" placeholder="Contraseña" required>
                <button type="submit">Entrar</button>
            </form>
            <p>¿No tienes cuenta? <a href="/registro" onclick="navigate(event, '/registro')">Regístrate</a></p>
        </section>
    </template>

    <template id="tpl-registro">
        <section>
            <h2>Crear cuenta</h2>
            <form id="form-registro">
                <input type="text" name="username" placeholder="Nombre de usuario" required>
                <input type="email" name="email" placeholder="Email" required>
                <input type="password" name="password" placeholder="Contraseña" required>
                <button type="submit">Registrarse</button>
            </form>
            <p>¿Ya tienes cuenta? <a href="/login" onclick="navigate(event, '/login')">Inicia sesión</a></p>
        </section>
    </template>

    <template id="tpl-solicitudes">
        <section>
            <h2>Mis solicitudes</h2>
            <button id="btn-nueva-solicitud">Nueva solicitud</button>
            <ul id="lista-solicitudes"></ul>
        </section>
    </template>

    <template id="tpl-404">
        <section>
            <h2>Página no encontrada</h2>
            <a href="/" onclick="navigate(event, '/')">Volver al inicio</a>
        </section>
    </template>

    <script src="{{ url_for('static', filename='js/auth.js') }}"></script>
    <script src="{{ url_for('static', filename='js/solicitudes.js') }}"></script>
    <script src="{{ url_for('static', filename='js/app.js') }}"></script>

</body>
</html>
