<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BlaBlaCat</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body { font-family: sans-serif; background: #f0f4f4; color: #333; }

        nav {
            background: #2c7a7b;
            padding: 1rem 2rem;
            display: flex;
            gap: 1.5rem;
            align-items: center;
        }
        nav a { color: white; text-decoration: none; font-weight: bold; font-size: .95rem; }
        nav a:hover { text-decoration: underline; }

        main { max-width: 740px; margin: 2rem auto; padding: 0 1rem; display: flex; flex-direction: column; gap: 1.5rem; }

        section {
            background: white;
            border-radius: 10px;
            padding: 2rem;
            box-shadow: 0 2px 10px rgba(0,0,0,.08);
        }

        h1, h2 { margin-bottom: 1rem; color: #2c7a7b; }
        h3 { margin: 1.2rem 0 .6rem; color: #2c7a7b; font-size: 1rem; }

        input, textarea, select {
            display: block; width: 100%;
            padding: .6rem .8rem; margin-bottom: .8rem;
            border: 1px solid #ccc; border-radius: 6px; font-size: 1rem;
        }
        textarea { resize: vertical; min-height: 80px; }

        button {
            background: #2c7a7b; color: white;
            border: none; padding: .5rem 1rem;
            border-radius: 6px; cursor: pointer; font-size: .9rem;
        }
        button:hover { background: #235f60; }
        button.btn-eliminar { background: #c0392b; }
        button.btn-eliminar:hover { background: #922b21; }
        button.btn-secundario { background: #888; }
        button.btn-secundario:hover { background: #666; }

        /* Listas */
        ul { list-style: none; margin-top: .8rem; }
        li.vacio { color: #999; font-size: .9rem; padding: .5rem 0; }
        .error { color: #c0392b; font-size: .9rem; margin-top: .4rem; }
        .ya-valorada { color: #27ae60; font-weight: bold; margin-top: 1rem; }

        /* Items de solicitud / usuario */
        .solicitud-item, .usuario-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: .8rem 1rem; border: 1px solid #e0e0e0;
            border-radius: 8px; margin-bottom: .5rem; background: #fafafa;
        }
        .solicitud-info, .usuario-info { display: flex; flex-direction: column; gap: .25rem; }
        .solicitud-acciones { display: flex; gap: .5rem; flex-wrap: wrap; }

        /* Badges */
        .badge { font-size: .78rem; padding: .2rem .5rem; border-radius: 4px; }
        .badge-aceptado { background: #d4edda; color: #155724; }
        .badge-pendiente { background: #fff3cd; color: #856404; }

        /* Media valoraciones */
        .usuario-media { font-size: .88rem; color: #666; }

        /* Valoraciones */
        .valoracion-item {
            border: 1px solid #e0e0e0; border-radius: 8px;
            padding: .8rem 1rem; margin-bottom: .5rem; background: #fafafa;
        }
        .valoracion-estrellas { font-size: 1rem; margin-bottom: .3rem; }
        .valoracion-comentario { margin: .3rem 0 .4rem; }
        #seccion-valorar { margin-top: 1.5rem; border-top: 1px solid #eee; padding-top: 1.5rem; }
        #perfil-media { color: #555; margin-bottom: 1rem; }

        /* Modal inscritos */
        .modal-overlay {
            position: fixed; inset: 0;
            background: rgba(0,0,0,.45);
            display: flex; align-items: center; justify-content: center;
            z-index: 100;
        }
        .modal {
            background: white; border-radius: 10px;
            padding: 2rem; min-width: 300px; max-width: 460px; width: 90%;
            box-shadow: 0 4px 20px rgba(0,0,0,.2);
        }
        .modal h3 { margin-bottom: 1rem; color: #2c7a7b; }
        .lista-inscritos { margin-bottom: 1rem; }
        .lista-inscritos li {
            display: flex; justify-content: space-between; align-items: center;
            padding: .5rem 0; border-bottom: 1px solid #eee;
        }
        .lista-inscritos li:last-child { border-bottom: none; }
    </style>
</head>
<body>

<nav>
    <a href="/" onclick="navigate(event, '/')">BlaBlaCat 🐱</a>
    <a href="/solicitudes" onclick="navigate(event, '/solicitudes')">Mis solicitudes</a>
    <a href="/usuarios" onclick="navigate(event, '/usuarios')">Cuidadores</a>
    <a href="/login"  onclick="navigate(event, '/login')"  id="nav-login">Login</a>
    <a href="#" onclick="logout()" id="nav-logout" style="display:none">Cerrar sesión</a>
</nav>

<main id="app"></main>

<!-- ── Templates ──────────────────────────────────────────── -->

<template id="tpl-home">
    <section>
        <h1>Bienvenido a BlaBlaCat 🐱</h1>
        <p>Plataforma de cuidado de mascotas. Encuentra un cuidador de confianza.</p>
    </section>
</template>

<template id="tpl-login">
    <section>
        <h2>Iniciar sesión</h2>
        <form id="form-login">
            <input type="email"    name="email"    placeholder="Email"      required>
            <input type="password" name="password" placeholder="Contraseña" required>
            <button type="submit">Entrar</button>
        </form>
        <p style="margin-top:1rem">¿No tienes cuenta?
            <a href="/registro" onclick="navigate(event, '/registro')">Regístrate</a>
        </p>
    </section>
</template>

<template id="tpl-registro">
    <section>
        <h2>Crear cuenta</h2>
        <form id="form-registro">
            <input type="text"     name="username" placeholder="Nombre de usuario" required>
            <input type="email"    name="email"    placeholder="Email"             required>
            <input type="password" name="password" placeholder="Contraseña"        required>
            <button type="submit">Registrarse</button>
        </form>
        <p style="margin-top:1rem">¿Ya tienes cuenta?
            <a href="/login" onclick="navigate(event, '/login')">Inicia sesión</a>
        </p>
    </section>
</template>

<template id="tpl-solicitudes">
    <section>
        <h2>Mis solicitudes</h2>
        <form id="form-nueva-solicitud">
            <input type="text" name="nombre"  placeholder="Nombre de la mascota" required>
            <input type="text" name="especie" placeholder="Especie"              required>
            <input type="text" name="raza"    placeholder="Raza (opcional)">
            <button type="submit">Nueva solicitud</button>
        </form>
        <ul id="lista-solicitudes"></ul>
    </section>
    <section>
        <h2>Solicitudes disponibles</h2>
        <p style="color:#666;font-size:.9rem;margin-bottom:.5rem">Ofrécete como cuidador en solicitudes de otros usuarios.</p>
        <ul id="lista-solicitudes-abiertas"></ul>
    </section>
</template>

<template id="tpl-usuarios">
    <section>
        <h2>Cuidadores registrados</h2>
        <p style="color:#666;font-size:.9rem;margin-bottom:.8rem">Consulta perfiles y valoraciones.</p>
        <ul id="lista-usuarios"></ul>
    </section>
</template>

<template id="tpl-perfil">
    <section>
        <h2 id="perfil-username"></h2>
        <p id="perfil-media"></p>

        <h3>Valoraciones recibidas</h3>
        <ul id="lista-valoraciones"></ul>

        <div id="seccion-valorar">
            <h3>Dejar una valoración</h3>
            <form id="form-valoracion">
                <label style="display:block;margin-bottom:.4rem">Puntuación:</label>
                <select name="puntuacion" required>
                    <option value="1">⭐ 1 — Muy malo</option>
                    <option value="2">⭐⭐ 2 — Malo</option>
                    <option value="3">⭐⭐⭐ 3 — Regular</option>
                    <option value="4">⭐⭐⭐⭐ 4 — Bueno</option>
                    <option value="5" selected>⭐⭐⭐⭐⭐ 5 — Excelente</option>
                </select>
                <textarea name="comentario" placeholder="Escribe tu valoración..." required></textarea>
                <button type="submit">Enviar valoración</button>
            </form>
        </div>
    </section>
</template>

<template id="tpl-404">
    <section>
        <h2>Página no encontrada</h2>
        <a href="/" onclick="navigate(event, '/')">Volver al inicio</a>
    </section>
</template>

<script src="{{ url_for('static', filename='js/auth.js') }}"></script>
<script src="{{ url_for('static', filename='js/solicitudes.js') }}"></script>
<script src="{{ url_for('static', filename='js/usuarios.js') }}"></script>
<script src="{{ url_for('static', filename='js/app.js') }}"></script>

</body>
</html>
