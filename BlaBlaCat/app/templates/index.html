<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BlaBlaCat</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
    <style>
        /* Complementos al styles.css de Kroko */
        .solicitud-item {
            display: flex; justify-content: space-between; align-items: center;
            gap: 1rem; padding: .9rem 1.2rem;
            background: var(--cream); border-radius: var(--radius);
            border: 1.5px solid var(--cream-dark); margin-bottom: .5rem;
            transition: box-shadow var(--transition);
        }
        .solicitud-item:hover { box-shadow: var(--shadow-sm); }
        .solicitud-info { display: flex; flex-direction: column; gap: .2rem; font-size: .93rem; }
        .solicitud-info small { color: var(--text-muted); font-size: .82rem; }
        .solicitud-acciones { display: flex; gap: .5rem; flex-wrap: wrap; }

        .usuario-item {
            display: flex; justify-content: space-between; align-items: center;
            gap: 1rem; padding: .9rem 1.2rem;
            background: var(--cream); border-radius: var(--radius);
            border: 1.5px solid var(--cream-dark); margin-bottom: .5rem;
        }
        .usuario-info { display: flex; flex-direction: column; gap: .2rem; }
        .usuario-media { font-size: .88rem; color: var(--text-muted); }

        .valoracion-item {
            padding: .9rem 1rem; border: 1.5px solid var(--cream-dark);
            border-radius: var(--radius); margin-bottom: .5rem; background: var(--cream);
        }
        .valoracion-estrellas { font-size: 1rem; margin-bottom: .3rem; }
        .valoracion-comentario { margin: .3rem 0 .4rem; }
        #seccion-valorar { margin-top: 1.5rem; border-top: 1.5px solid var(--cream-dark); padding-top: 1.5rem; }
        #perfil-media { color: var(--text-muted); margin-bottom: 1rem; }

        ul { list-style: none; }
        li.vacio { color: var(--text-muted); font-size: .9rem; padding: .5rem 0; }
        .ya-valorada { color: var(--success); font-weight: bold; margin-top: 1rem; }

        .badge { display: inline-block; padding: .2rem .6rem; border-radius: 99px; font-size: .78rem; font-weight: 700; }
        .badge-aceptado { background: var(--success-light); color: var(--success); }
        .badge-pendiente { background: #fff3cd; color: #856404; }

        button:not([type="submit"]) {
            padding: .4rem .9rem; background: var(--purple); color: #fff;
            border: none; border-radius: var(--radius-sm); cursor: pointer;
            font-family: 'Nunito', sans-serif; font-size: .85rem; font-weight: 700;
            transition: background var(--transition);
        }
        button:not([type="submit"]):hover { background: var(--purple-deep); }
        button.btn-eliminar { background: var(--danger); }
        button.btn-eliminar:hover { background: #922b21; }
        button.btn-secundario { background: var(--text-muted); }
        button.btn-secundario:hover { background: #666; }

        select {
            display: block; width: 100%; padding: .6rem .8rem; margin-bottom: .8rem;
            border: 2px solid var(--cream-dark); border-radius: var(--radius);
            font-size: .95rem; background: var(--cream); color: var(--text);
        }
        textarea { min-height: 80px; }

        .modal-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,.45);
            display: flex; align-items: center; justify-content: center; z-index: 200;
        }
        .modal {
            background: #fff; border-radius: var(--radius-lg); padding: 2rem;
            min-width: 300px; max-width: 460px; width: 90%;
            box-shadow: var(--shadow-lg);
        }
        .modal h3 { margin-bottom: 1rem; color: var(--brown-deep); }
        .lista-inscritos li {
            display: flex; justify-content: space-between; align-items: center;
            padding: .5rem 0; border-bottom: 1px solid var(--cream-dark);
        }
        .lista-inscritos li:last-child { border-bottom: none; }
    </style>
</head>
<body>

<nav>
    <a href="/" onclick="navigate(event, '/')" class="nav-logo">
        <img src="{{ url_for('static', filename='img/logo.png') }}"
             alt="BlaBlaCat logo" onerror="this.style.display='none'">
        <span class="nav-brand">Bla<span>Bla</span>Cat</span>
    </a>

    <a href="/proximas" onclick="navigate(event, '/proximas')">Solicitudes</a>

    <a href="/solicitudes" onclick="navigate(event, '/solicitudes')"
       id="nav-solicitudes" style="display:none">Mis solicitudes</a>

    <a href="/usuarios" onclick="navigate(event, '/usuarios')"
       id="nav-cuidadores" style="display:none">Cuidadores</a>

    <span id="nav-admin" style="display:none">
        <a href="/admin/usuarios"    onclick="navigate(event, '/admin/usuarios')">👥 Usuarios</a>
        <a href="/admin/solicitudes" onclick="navigate(event, '/admin/solicitudes')">🐾 Solicitudes</a>
    </span>

    <a href="/login" onclick="navigate(event, '/login')" id="nav-login">Entrar</a>
    <span id="nav-logout" style="display:none">
        <span id="nav-username"></span>
        &nbsp;·&nbsp;
        <a href="#" onclick="logout()">Salir</a>
    </span>
</nav>

<main id="app"></main>

<!-- ══ TEMPLATES ══════════════════════════════════════════ -->

<template id="tpl-home">
    <section class="home-hero">
        <h1>La comunidad de<br><em>cuidadores de mascotas</em></h1>
        <p>Conecta con personas de confianza que cuidarán a tu compañero como si fuera el suyo.</p>
        <div class="home-cta">
            <a href="/registro" onclick="navigate(event, '/registro')" class="cta-main">Empieza gratis</a>
            <a href="/login"    onclick="navigate(event, '/login')"    class="cta-secondary">Iniciar sesión</a>
        </div>
    </section>
</template>

<template id="tpl-login">
    <section class="auth-section">
        <h2>Iniciar sesión</h2>
        <form id="form-login">
            <input type="email"    name="email"    placeholder="Email"      required>
            <input type="password" name="password" placeholder="Contraseña" required>
            <button type="submit">Entrar</button>
        </form>
        <p>¿No tienes cuenta? <a href="/registro" onclick="navigate(event, '/registro')">Regístrate</a></p>
    </section>
</template>

<template id="tpl-registro">
    <section class="auth-section">
        <h2>Crear cuenta</h2>
        <form id="form-registro">
            <input type="text"     name="username" placeholder="Nombre de usuario" required>
            <input type="email"    name="email"    placeholder="Email"             required>
            <input type="password" name="password" placeholder="Contraseña"        required>
            <button type="submit">Registrarse</button>
        </form>
        <p>¿Ya tienes cuenta? <a href="/login" onclick="navigate(event, '/login')">Inicia sesión</a></p>
    </section>
</template>

<template id="tpl-solicitudes">
    <section>
        <h2>Mis solicitudes</h2>
        <form id="form-nueva-solicitud">
            <input type="text"           name="nombre"          placeholder="Nombre de la mascota" required>
            <input type="text"           name="especie"         placeholder="Especie"              required>
            <input type="text"           name="raza"            placeholder="Raza (opcional)">
            <input type="datetime-local" name="horario_inicio"  placeholder="Inicio del cuidado">
            <input type="datetime-local" name="horario_fin"     placeholder="Fin del cuidado">
            <textarea                    name="especificaciones" placeholder="Especificaciones (alergias, rutinas...)"></textarea>
            <button type="submit">Nueva solicitud</button>
        </form>
        <ul id="lista-solicitudes"></ul>
    </section>
    <section style="margin-top:1.5rem">
        <h2>Solicitudes disponibles</h2>
        <p style="color:var(--text-muted);font-size:.9rem;margin-bottom:.5rem">
            Ofrécete como cuidador en solicitudes de otros usuarios.
        </p>
        <ul id="lista-solicitudes-abiertas"></ul>
    </section>
</template>

<template id="tpl-proximas">
    <section>
        <h2>Próximas solicitudes de cuidado</h2>
        <p style="color:var(--text-muted);font-size:.9rem;margin-bottom:.8rem">
            Solicitudes abiertas con fecha futura. Regístrate para ofrecerte como cuidador.
        </p>
        <ul id="lista-proximas"></ul>
    </section>
</template>

<template id="tpl-usuarios">
    <section>
        <h2>Cuidadores registrados</h2>
        <p style="color:var(--text-muted);font-size:.9rem;margin-bottom:.8rem">
            Consulta perfiles y valoraciones de otros usuarios.
        </p>
        <ul id="lista-usuarios"></ul>
    </section>
</template>

<template id="tpl-perfil">
    <section>
        <h2 id="perfil-username"></h2>
        <p id="perfil-media"></p>
        <h3>Valoraciones recibidas</h3>
        <ul id="lista-valoraciones"></ul>
        <div id="seccion-valorar">
            <h3>Dejar una valoración</h3>
            <form id="form-valoracion">
                <label style="display:block;margin-bottom:.4rem">Puntuación:</label>
                <select name="puntuacion" required>
                    <option value="1">⭐ 1 — Muy malo</option>
                    <option value="2">⭐⭐ 2 — Malo</option>
                    <option value="3">⭐⭐⭐ 3 — Regular</option>
                    <option value="4">⭐⭐⭐⭐ 4 — Bueno</option>
                    <option value="5" selected>⭐⭐⭐⭐⭐ 5 — Excelente</option>
                </select>
                <textarea name="comentario" placeholder="Escribe tu valoración..." required></textarea>
                <button type="submit">Enviar valoración</button>
            </form>
        </div>
    </section>
</template>

<template id="tpl-admin-usuarios">
    <section>
        <h2>👥 Gestión de usuarios</h2>
        <a href="/admin/solicitudes" onclick="navigate(event, '/admin/solicitudes')"
           class="admin-back">🐾 Ver catálogo de solicitudes →</a>
        <table>
            <thead>
                <tr><th>ID</th><th>Usuario</th><th>Email</th><th>Rol</th><th>Acción</th></tr>
            </thead>
            <tbody id="lista-admin-usuarios">
                <tr><td colspan="5">Cargando...</td></tr>
            </tbody>
        </table>
    </section>
</template>

<template id="tpl-admin-solicitudes">
    <section>
        <h2>🐾 Catálogo de solicitudes</h2>
        <a href="/admin/usuarios" onclick="navigate(event, '/admin/usuarios')"
           class="admin-back">👥 Ver usuarios →</a>
        <table>
            <thead>
                <tr><th>ID</th><th>Foto</th><th>Nombre</th><th>Especie/Raza</th><th>Propietario</th><th>Inicio</th><th>Fin</th></tr>
            </thead>
            <tbody id="lista-admin-solicitudes">
                <tr><td colspan="7">Cargando...</td></tr>
            </tbody>
        </table>
    </section>
</template>

<template id="tpl-404">
    <section style="text-align:center;padding:3rem 2rem;">
        <h2>🐾 Página no encontrada</h2>
        <p style="margin:1rem 0;">Parece que esta huella no lleva a ningún sitio.</p>
        <a href="/" onclick="navigate(event, '/')"
           style="display:inline-block;margin-top:1rem;padding:.8rem 2rem;
                  background:linear-gradient(135deg,#A0662A,#7B5EA7);
                  color:#fff;border-radius:14px;font-weight:700;">
            Volver al inicio
        </a>
    </section>
</template>

<script src="{{ url_for('static', filename='js/auth.js') }}"></script>
<script src="{{ url_for('static', filename='js/admin.js') }}"></script>
<script src="{{ url_for('static', filename='js/solicitudes.js') }}"></script>
<script src="{{ url_for('static', filename='js/usuarios.js') }}"></script>
<script src="{{ url_for('static', filename='js/app.js') }}"></script>

</body>
</html>
