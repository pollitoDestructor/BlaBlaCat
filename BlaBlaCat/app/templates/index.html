<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BlaBlaCat</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
    <style>
        /* ── Estilos mínimos para el panel admin ── */
        table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
        th, td { padding: .5rem .75rem; border: 1px solid #ddd; text-align: left; }
        th { background: #f5f5f5; }
        .badge { padding: .2rem .5rem; border-radius: 4px; font-size: .8rem; }
        .badge-administrador { background: #d4edda; color: #155724; }
        .badge-estandar      { background: #d1ecf1; color: #0c5460; }
        .btn-danger  { background: #dc3545; color: #fff; border: none; padding: .3rem .7rem; border-radius: 4px; cursor: pointer; }
        .btn-danger:disabled { background: #aaa; cursor: not-allowed; }
        .mascota-thumb { width: 48px; height: 48px; object-fit: cover; border-radius: 4px; }
        .error-msg { color: red; }
    </style>
</head>
<body>

    <!-- Navegación -->
    <nav>
        <a href="/" onclick="navigate(event, '/')">Inicio</a>

        <!-- Solo usuarios estándar logueados -->
        <a href="/solicitudes" onclick="navigate(event, '/solicitudes')"
           id="nav-solicitudes" style="display:none">Mis solicitudes</a>

        <!-- Solo admin -->
        <span id="nav-admin" style="display:none">
            <a href="/admin/usuarios"    onclick="navigate(event, '/admin/usuarios')"> 👥 Usuarios </a>
            <a href="/admin/solicitudes" onclick="navigate(event, '/admin/solicitudes')"> 🐾 Solicitudes </a>
        </span>

        <!-- Auth -->
        <a href="/login"   onclick="navigate(event, '/login')"  id="nav-login">Login</a>
        <span id="nav-logout" style="display:none">
            <span id="nav-username" style="font-weight:bold"></span>
            &nbsp;·&nbsp;
            <a href="#" onclick="logout()">Cerrar sesión</a>
        </span>
    </nav>

    <!-- Contenedor SPA -->
    <main id="app"></main>

    <!-- ══════════════ TEMPLATES ══════════════ -->

    <template id="tpl-home">
        <section>
            <h1>Bienvenido a BlaBlaCat</h1>
            <p>Plataforma de cuidado de mascotas.</p>
        </section>
    </template>

    <template id="tpl-login">
        <section>
            <h2>Iniciar sesión</h2>
            <form id="form-login">
                <input type="email"    name="email"    placeholder="Email"      required><br>
                <input type="password" name="password" placeholder="Contraseña" required><br>
                <button type="submit">Entrar</button>
            </form>
            <p>¿No tienes cuenta? <a href="/registro" onclick="navigate(event, '/registro')">Regístrate</a></p>
        </section>
    </template>

    <template id="tpl-registro">
        <section>
            <h2>Crear cuenta</h2>
            <form id="form-registro">
                <input type="text"     name="username" placeholder="Nombre de usuario" required><br>
                <input type="email"    name="email"    placeholder="Email"             required><br>
                <input type="password" name="password" placeholder="Contraseña"        required><br>
                <button type="submit">Registrarse</button>
            </form>
            <p>¿Ya tienes cuenta? <a href="/login" onclick="navigate(event, '/login')">Inicia sesión</a></p>
        </section>
    </template>

    <template id="tpl-solicitudes">
        <section>
            <h2>Mis solicitudes</h2>
            <form id="form-nueva-solicitud">
                <input type="text" name="nombre"  placeholder="Nombre de la mascota" required>
                <input type="text" name="especie" placeholder="Especie"              required>
                <input type="text" name="raza"    placeholder="Raza (opcional)">
                <button type="submit">Nueva solicitud</button>
            </form>
            <ul id="lista-solicitudes"></ul>
        </section>
    </template>

    <!-- ── Admin: lista de usuarios (#276 / #298) ── -->
    <template id="tpl-admin-usuarios">
        <section>
            <h2>👥 Gestión de usuarios</h2>
            <p><a href="/admin/solicitudes" onclick="navigate(event, '/admin/solicitudes')">← Ver catálogo de mascotas</a></p>
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Usuario</th>
                        <th>Email</th>
                        <th>Rol</th>
                        <th>Acción</th>
                    </tr>
                </thead>
                <tbody id="lista-admin-usuarios">
                    <tr><td colspan="5">Cargando...</td></tr>
                </tbody>
            </table>
        </section>
    </template>

    <!-- ── Admin: catálogo de mascotas/solicitudes (#300) ── -->
    <template id="tpl-admin-solicitudes">
        <section>
            <h2>🐾 Catálogo de mascotas</h2>
            <p><a href="/admin/usuarios" onclick="navigate(event, '/admin/usuarios')">← Ver usuarios</a></p>
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Foto</th>
                        <th>Nombre</th>
                        <th>Especie / Raza</th>
                        <th>Propietario</th>
                        <th>Inicio</th>
                        <th>Fin</th>
                    </tr>
                </thead>
                <tbody id="lista-admin-solicitudes">
                    <tr><td colspan="7">Cargando...</td></tr>
                </tbody>
            </table>
        </section>
    </template>

    <template id="tpl-404">
        <section>
            <h2>Página no encontrada</h2>
            <a href="/" onclick="navigate(event, '/')">Volver al inicio</a>
        </section>
    </template>

    <!-- Scripts — orden importante: auth → admin → solicitudes → app -->
    <script src="{{ url_for('static', filename='js/auth.js') }}"></script>
    <script src="{{ url_for('static', filename='js/admin.js') }}"></script>
    <script src="{{ url_for('static', filename='js/solicitudes.js') }}"></script>
    <script src="{{ url_for('static', filename='js/app.js') }}"></script>

</body>
</html>
